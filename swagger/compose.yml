services:
  cors-proxy:
    image: nginx:alpine
    container_name: piyolog-cors-proxy
    ports:
      - "8081:8081"
    volumes:
      - ./nginx-cors-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - piyolog-network

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: piyolog-swagger-ui
    ports:
      - "80:8080"
    volumes:
      - ./swagger.yaml:/usr/share/nginx/html/swagger.yaml:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped
    depends_on:
      - cors-proxy
    networks:
      - piyolog-network

networks:
  piyolog-network:
    driver: bridge
