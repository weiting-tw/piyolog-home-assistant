openapi: 3.1.0
info:
  title: ぴよログAPI
  version: "6.0"
  description: |
    ぴよログAPI（v2.0）のリバースエンジニアリングに基づいた非公式の仕様書です。
    実際のAPIは予告なく変更される可能性があります。
    研究・教育目的での利用に限ります。

servers:
  - url: https://api2.piyolog.com
    description: ぴよログAPIサーバ

paths:
  # ==================== User Management ====================
  /create_user:
    post:
      summary: 新規デバイス/ユーザーの登録
      operationId: createUser
      tags: [ユーザ管理]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - api_version
                - user_id
                - name
                - hash
              properties:
                api_version:
                  type: number
                  example: 2.0
                user_id:
                  type: string
                  description: クライアントによって生成された UUID4
                  example: 4ed161b5-0d3c-4f06-8381-5f14678e13da
                name:
                  type: string
                  description: デバイス名
                  example: "My Python Client"
                hash:
                  type: string
                  description: "MD5(user_id + 'NewPiyoLogApp')"
                  example: "c4ca4238a0b923820dcc509a6f75849b"
      responses:
        "200":
          description: 登録成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StatusResponse"
                  - type: object
                    properties:
                      client_id:
                        type: integer
                        description: このクライアントの内部 ID
                      client_token:
                        type: string
                        description: 今後のリクエストに使用する秘密トークン
        "4XX":
          description: エラー（HTTPステータスは200だがボディの `status` フィールドにエラーコード）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /client_list:
    post:
      summary: クライアント/デバイスのリスト取得
      operationId: clientList
      tags: [ユーザ管理]
      description: 全てのクライアント/デバイスのリストを取得
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: クライアントのリスト
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StatusResponse"
                  - type: object
                    properties:
                      clients:
                        type: array
                        items:
                          $ref: "#/components/schemas/ClientInfo"
        "4XX":
          description: エラー（HTTPステータスは200だがボディの `status` フィールドにエラーコード）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /client_info:
    post:
      summary: クライアント情報の取得
      operationId: clientInfo
      tags: [ユーザ管理]
      description: 特定のクライアントの詳細情報を取得
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: クライアント情報
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StatusResponse"
                  - type: object
                    properties:
                      client:
                        $ref: "#/components/schemas/ClientInfo"
        "4XX":
          description: エラー（HTTPステータスは200だがボディの `status` フィールドにエラーコード）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /update_client:
    post:
      summary: クライアント情報の更新
      operationId: updateClient
      tags: [ユーザ管理]
      description: |
        クライアントの名前、ロール、ステータスを更新

        **デバイス削除について:**
        アプリの「アカウント削除」機能は実際にはこのエンドポイントを使用して
        `status: "DELETED"` を設定することで、デバイスをアカウントから削除します。
        アカウント全体（ぴよログID）は削除されません。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/AuthRequest"
                - type: object
                  required:
                    - target_client
                  properties:
                    target_client:
                      type: object
                      required:
                        - client_id
                      properties:
                        client_id:
                          type: integer
                          description: 更新対象のクライアントID
                        name:
                          type: string
                          description: 新しいデバイス名
                        role:
                          $ref: "#/components/schemas/RoleType"
                        status:
                          $ref: "#/components/schemas/ClientStatus"
                          example: "ACTIVE"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "4XX":
          description: エラー（HTTPステータスは200だがボディの `status` フィールドにエラーコード）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==================== Data Synchronization ====================
  /sync:
    post:
      summary: データの同期（アップロード/ダウンロード）
      operationId: sync
      tags: [データ関連]
      description: |
        データの読み書きを行う主要なエンドポイント。

        - **アップロード**: 全データを送信する必要はなく、変更された項目のみ送信
        - **ダウンロード**: サーバは全データを返さず、前回同期以降の変更のみ返す
        - 初回同期（`main_version=1, minor_version=1`）時に全データを受信

        ## アップロード（Client → Server）
        - クライアントは新規のデータを `minor_version = 0` として送信
        - 変更されていない既存データは送信不要
        - `data` オブジェクトに新規/更新したレコードのみ含める
        - サーバは各項目に新しい `minor_version` を割り当てる

        ## ダウンロード（Server → Client）
        - クライアントは前回同期時に受け取った `main_version` と `minor_version` を送信
        - サーバはクライアントのバージョンより**新しい項目のみ**を返す
        - `main_version=1, minor_version=1` の場合は全データを返す（初回同期時）
        - クライアントは受信データをローカルにマージ（全置き換えではない）

        ## バージョン管理の仕組み

        **2種類の `minor_version` があることに注意:**

        1. **リクエストのトップレベル**（クライアント全体の状態）
           - クライアントが「どこまで同期済みか」を示す
           - 前回の同期レスポンスから受け取った値をそのまま送信
           - 例: `{"main_version": 1, "minor_version": 42, "data": {...}}`

        2. **個々のデータアイテム内**（アイテムごとの状態）
           - 各アイテムが「同期済みか未同期か」を示す
           - 変更されたアイテムは `0` に設定される
           - 例: `{"event_id": "abc", "minor_version": 0, ...}`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - api_version
                - user_id
                - client_id
                - client_token
                - app
              properties:
                api_version:
                  type: number
                  example: 2.0
                user_id:
                  type: string
                  example: "YOUR_PIYOLOG_ID"
                client_id:
                  type: integer
                  example: 1
                client_token:
                  type: string
                  example: "YOUR_CLIENT_TOKEN"
                main_version:
                  type: integer
                  default: 1
                  description: |
                    前回同期時にサーバーから受け取った `main_version`。
                    クライアントはこの値を保存しておく。
                    - 1 = 初期値、全データダウンロード
                    - >1 = このバージョンより新しいデータのみダウンロード（通常は利用されない）
                  example: 1
                minor_version:
                  type: integer
                  default: 1
                  description: |
                    前回同期時にサーバーから受け取った `minor_version`。
                    クライアントはこの値を保存しておく。
                    サーバはこの値より大きい `minor_version` を持つ項目のみ返す。
                  example: 1
                app:
                  type: string
                  description: |
                    アプリケーション名（必須フィールド）
                  example: "PiyoLog for android"
                data:
                  type: object
                  description: |
                    アップロードする新規/更新レコードのコンテナ。
                    `minor_version=0` の項目のみを含める。
                  properties:
                    baby:
                      type: array
                      description: 更新された赤ちゃんプロフィール
                      items:
                        $ref: "#/components/schemas/Baby"
                    baby_event:
                      type: array
                      description: 新規/更新された赤ちゃんイベント
                      items:
                        $ref: "#/components/schemas/BabyEvent"
                    day_log:
                      type: array
                      description: 新規/更新された日次ログ
                      items:
                        $ref: "#/components/schemas/DayLog"
                    food_record:
                      type: array
                      description: 新規/更新された食事記録
                      items:
                        $ref: "#/components/schemas/FoodRecord"
                    calendar_event:
                      type: array
                      description: 新規/更新されたカレンダーイベント
                      items:
                        $ref: "#/components/schemas/CalendarEvent"
                    custom_event_info:
                      type: object
                      description: カスタムイベント設定（更新されている場合）
                    purchase_info:
                      type: object
                      description: 購入情報（更新されている場合）
      responses:
        "200":
          description: 同期成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "4XX":
          description: エラー（HTTPステータスは200だがボディの `status` フィールドにエラーコード）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /force_sync_to_app:
    post:
      summary: 強制ダウンロード（ローカル上書き）
      operationId: forceSyncToApp
      tags: [データ関連]
      description: サーバの状態のダウンロードを明示的に強制し、ローカルデータを上書きすることを意図
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: 全データダンプを返します
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "4XX":
          description: エラー（HTTPステータスは200だがボディの `status` フィールドにエラーコード）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /get_baby_event_extra:
    post:
      summary: イベントの拡張データを取得
      operationId: getBabyEventExtra
      tags: [データ関連]
      description: |
        特定のイベントの変更履歴を取得。
        イベントがどのクライアント（デバイス）でいつ作成・変更されたかの履歴を表示する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/AuthRequest"
                - type: object
                  required:
                    - event_id
                  properties:
                    event_id:
                      type: string
                      description: イベントID
      responses:
        "200":
          description: イベント拡張データ
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      baby_event_extra:
                        type: array
                        description: イベントの変更履歴（どのクライアントがいつ変更したか）
                        items:
                          $ref: "#/components/schemas/BabyEventExtra"
                  server_version:
                    type: integer
                    description: サーババージョン
                    example: 29
        "4XX":
          description: エラー（HTTPステータスは200だがボディの `status` フィールドにエラーコード）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==================== Share Code / Account Linking ====================
  /share_code_create:
    post:
      summary: 共有コードの作成
      operationId: shareCodeCreate
      tags: [アカウント共有]
      description: アカウント共有用の共有コードを生成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/AuthRequest"
                - type: object
                  required:
                    - type
                  properties:
                    role:
                      $ref: "#/components/schemas/RoleType"
                    type:
                      type: integer
                      description: "1 = 共有（デバイス追加）, 0 = 引き継ぎ（移行）"
                      example: 1
      responses:
        "200":
          description: 共有コードを返します
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StatusResponse"
                  - type: object
                    properties:
                      code:
                        type: string
                        description: 生成された共有コード
        "4XX":
          description: エラー（HTTPステータスは200だがボディの `status` フィールドにエラーコード）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /share_code_confirm:
    post:
      summary: 共有コードを使用した既存アカウントへのリンク
      operationId: shareCodeConfirm
      tags: [アカウント共有]
      description: モバイルアプリからの共有コードを、共有アカウントへの有効な認証情報と交換
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - api_version
                - user_id
                - code
                - name
                - type
              properties:
                api_version:
                  type: number
                  example: 2.0
                user_id:
                  type: string
                  description: リンク先のユーザー ID
                  example: "OTHER_USER_ID"
                code:
                  type: string
                  description: アプリからの共有コード（設定 -> 共有）
                  example: "1678"
                name:
                  type: string
                  description: デバイス名
                  example: "My Device"
                type:
                  type: integer
                  description: "1 = 共有（デバイス追加）, 0 = 引き継ぎ（移行）"
                  example: 1
      responses:
        "200":
          description: リンク成功。共有アカウントの新しい認証情報を返します
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StatusResponse"
                  - type: object
                    properties:
                      user_id:
                        type: string
                        description: 共有アカウントの UUID。設定をこれに更新してください
                      client_id:
                        type: integer
                        description: 共有アカウントでのこのデバイスの新しいクライアント ID
                      client_token:
                        type: string
                        description: 共有アカウントの新しいクライアントトークン
                      role:
                        $ref: "#/components/schemas/RoleType"
        "4XX":
          description: エラー（HTTPステータスは200だがボディの `status` フィールドにエラーコード）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

# ==================== Components ====================
components:
  schemas:
    AuthRequest:
      type: object
      description: |
        標準的な認証リクエスト
      required:
        - api_version
        - user_id
        - client_id
        - client_token
      properties:
        api_version:
          type: number
          default: 2.0
          description: API バージョン（固定値）
        user_id:
          type: string
          example: "YOUR_PIYOLOG_ID"
          description: ぴよログID（ユーザID）
        client_id:
          type: integer
          example: 1
          descritption: クライアントID（デバイスID）
        client_token:
          type: string
          example: "YOUR_CLIENT_TOKEN"
          description: クライアントトークン

    StatusResponse:
      type: object
      description: |
        標準的なステータスレスポンス
      properties:
        status:
          type: integer
          example: 200
          description: レスポンスステータスコード

    ErrorResponse:
      type: object
      description: |
        エラーレスポンス。HTTPステータスは常に200だが、ボディ内の `status` フィールドにエラーコードが入る。

        | status | `message` の例 | 説明 |
        |--------|----------------|------|
        | 400    | "auth error", "invalid endpoint", "db connection error" 等 | 一般的なエラー。詳細は `message` フィールドを参照 |
        | 401    | `message` フィールドなし | バージョン不一致のため再同期が必要。レスポンスに `user_id`, `main_version`, `minor_version` が含まれるので、それらを使って同期する |
        | 402    | "no user info" | ユーザー情報が存在しない（赤ちゃんデータ未登録の新規アカウントなど） |
        | 404    | "hash error" | ハッシュ値が不正（`/create_user` の `hash` フィールド） |
        | 405    | "client is not admin" | 管理者権限が必要な操作を非管理者クライアントが実行しようとした |
      properties:
        status:
          type: integer
          description: エラーコード
          examples:
            - 400
            - 401
            - 402
            - 404
            - 405
        message:
          type: string
          description: エラーの詳細メッセージ
          examples:
            - "auth error"
            - "invalid endpoint"
            - "db connection error"
            - "hash error"
            - "client is not admin"
        server_version:
          type: integer
          description: サーバソフトウェアバージョン
          example: 29

    ClientInfo:
      type: object
      description: |
        クライアント/デバイス情報
      properties:
        client_id:
          type: integer
          description: クライアントID
        name:
          type: string
          description: デバイス名
        role:
          $ref: "#/components/schemas/RoleType"
        status:
          $ref: "#/components/schemas/ClientStatus"

    BabyEventExtra:
      type: object
      description: |
        イベント変更履歴の詳細情報
      properties:
        client_support_name:
          type: string
          description: クライアント識別子
          example: "XCPA"
        app:
          type: string
          description: アプリ名
          examples:
            - "PiyoLog for iPhone"
            - "PiyoLog for android"
        user_id:
          type: string
        action:
          type: integer
          description: アクション種別（0 = 作成/更新）
          example: 0
        baby_id:
          type: string
        client_id:
          type: integer
        timestamp:
          type: integer
          format: int64
          description: 変更日時（ミリ秒）
        event_id:
          type: string
        expiration_date:
          type: integer
          format: int64
          description: 有効期限（UNIX timestamp）
        client_name:
          type: string
          description: デバイス名
          examples:
            - "iPhone"
            - "パパ"
        snapshot:
          type: string
          description: イベントデータのJSONスナップショット
        event_id+timestamp:
          type: string
          description: 複合キー（event_id-timestamp）

    SyncResponse:
      type: object
      description: |
        同期レスポンス。サーバはクライアントが送信した `main_version` / `minor_version` より
        新しいデータのみを返す。
      properties:
        status:
          type: integer
          example: 200
        user_id:
          type: string
          description: ユーザーID（ぴよログID）
          example: "YOUR_PIYOLOG_ID"
        main_version:
          type: integer
          description: |
            サーバの最新メインバージョン（クライアントはこれを保存し、再利用することが推奨されます）

            通常は 1 で固定。次回同期時にこの値を送信すること。
          example: 1
        minor_version:
          type: integer
          description: |
            サーバの最新マイナーバージョン（クライアントはこれを保存し、再利用することが推奨されます）

            各変更でインクリメントされる。次回同期時にこの値を送信すると
            差分のみ取得できる。
          example: 1832
        server_version:
          type: integer
          description: サーバソフトウェアバージョン
          example: 29
        data:
          type: object
          description: |
            クライアントのバージョンより新しいデータのみを含む。
            - リクエストの `main_version=1, minor_version=1` の場合: 全データ
            - それ以外: `minor_version` がクライアント値より大きい項目のみ
          properties:
            baby:
              type: array
              description: 更新された赤ちゃんプロフィール
              items:
                $ref: "#/components/schemas/Baby"
            baby_event:
              type: array
              description: 新規/更新された赤ちゃんイベント
              items:
                $ref: "#/components/schemas/BabyEvent"
            calendar_event:
              type: array
              description: 新規/更新されたカレンダーイベント
              items:
                $ref: "#/components/schemas/CalendarEvent"
            day_log:
              type: array
              description: 新規/更新された日次ログ
              items:
                $ref: "#/components/schemas/DayLog"
            food_record:
              type: array
              description: 新規/更新された食事記録
              items:
                $ref: "#/components/schemas/FoodRecord"
            custom_event_info:
              type: object
              description: カスタムイベント設定（更新されている場合）
            purchase_info:
              type: object
              description: 購入情報（更新されている場合）

    Baby:
      type: object
      description: 赤ちゃん情報
      properties:
        user_id:
          type: string
          description: ユーザーID
          example: "USER_ID_EXAMPLE"
        baby_id:
          type: string
          description: 赤ちゃんID
          example: "BABY_ID_EXAMPLE"
        nickname:
          type: string
          description: ニックネーム
          example: "ベビちゃん"
        birthday:
          type: integer
          description: 誕生日（YYYYMMDD）
          example: 20260101
        sex:
          type: integer
          description: 性別（0=男の子, 1=女の子, 2=選択なし）
          example: 1
        created_at:
          type: integer
          description: Unix タイムスタンプ（ミリ秒） - 作成日時
          example: 1754176087395
        modified_at:
          type: integer
          description: Unix タイムスタンプ（ミリ秒） - 更新日時
          example: 1767419429351
        deleted:
          type: boolean
          description: 削除フラグ
          example: false
        main_version:
          type: integer
          description: メインバージョン
