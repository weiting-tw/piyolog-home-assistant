        - `2`: 削除済み / DELETED
      enum:
        - 0 # ACTIVE
        - 1 # SUSPEND
        - 2 # DELETED

    BabyEvent:
      type: object
      description: 赤ちゃんイベント（授乳、睡眠、おむつ替えなど）
      properties:
        user_id:
          type: string
          description: ユーザーID（ぴよログID）
          example: "USER_ID_EXAMPLE"
        baby_id:
          type: string
          description: 赤ちゃんID
          example: "BABY_ID_EXAMPLE"
        event_id:
          type: string
          description: イベントID（MD5ハッシュ）
          example: "abc123def456"
        type:
          $ref: "#/components/schemas/EventType"
        date:
          type: integer
          description: YYYYMMDD
          example: 20260103
        time:
          type: string
          description: HH:mm
          example: "14:30"
        datetime:
          type: string
          description: "YYYYMMDD HH:mm"
          example: "20260103 14:30"
        datetime2:
          type: integer
          description: Unix タイムスタンプ（ミリ秒） - イベント日時
          example: 1767405600000
        memo:
          type: string
          description: メモ
          example: ""
        left_time:
          type: integer
          description: |
            左側の授乳時間（秒） / うんちの色（イベントタイプにより異なる）

            **母乳（type=1）の場合:**
            - 左側の授乳時間（秒）

            **うんち（type=7）の場合 - 色:**
            - `0`: 記録しない / Not recorded
            - `1`: 白 / White
            - `2`: 黄 / Yellow
            - `3`: 橙 / Orange
            - `4`: 茶 / Brown
            - `5`: 緑 / Green
            - `6`: 赤 / Red
            - `7`: 黒 / Black
          example: 300
        right_time:
          type: integer
          description: 右側の授乳時間（秒）
          example: 300
        amount:
          type: number
          description: |
            量（イベントタイプにより異なる）

            **母乳（type=1）、ミルク（type=2）、搾母乳（type=3）、搾乳（type=23）の場合:**
            - ミルク・母乳の量（ml）
            - 母乳の場合、量の記録は任意

            **うんち（type=7）の場合:**
            - `0`: 記録しない / Not recorded
            - `1`: 少なめ / Small
            - `2`: 多め / Large
            - `3`: ふつう / Medium
            - `4`: ちょこっと / Bit
          example: 50
        value:
          type: number
          description: |
            値（イベントタイプにより異なる）

            **体温（type=8）の場合:**
            - 体温（℃）

            **身長（type=10）の場合:**
            - 身長（cm）

            **体重（type=11）の場合:**
            - 体重（kg）

            **母乳（type=1）の場合 - 授乳の順番:**
            - `0`: 順序なし / No order
            - `1`: 左から / L to R
            - `2`: 右から / R to L

            **うんち（type=7）の場合 - 硬さ:**
            - `0`: 記録しない / Not recorded
            - `1`: 下痢 / Diarrhea
            - `2`: やわらかめ / Soft
            - `3`: かため / Hard
            - `4`: ふつう / Medium
          example: 36.5
        image_url:
          type: string
          description: 画像URL
          example: ""
        created_at:
          type: integer
          description: Unix タイムスタンプ（ミリ秒） - 作成日時
          example: 1767410066444
        modified_at:
          type: integer
          description: Unix タイムスタンプ（ミリ秒） - 更新日時
          example: 1767410066444
        deleted:
          type: boolean
          description: 削除フラグ
          example: false
        main_version:
          type: integer
          description: メインバージョン
          example: 1
        minor_version:
          type: integer
          description: マイナーバージョン
          example: 4
        meta:
          type: string
          nullable: true
          description: メタデータ（JSONまたはnull）
          example: null
