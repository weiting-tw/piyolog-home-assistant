        イベントタイプ定数

        - `0`: その他 / Others
        - `1`: 母乳 / Breastfeeding
        - `2`: ミルク / Formula
        - `3`: 搾母乳 / EBM
        - `4`: 寝る / Sleep
        - `5`: 起きる / Wake-up
        - `6`: おしっこ / Pee
        - `7`: うんち / Poop
        - `8`: 体温 / Body Temperature
        - `9`: 離乳食 / Solid food
        - `10`: 身長 / Height
        - `11`: 体重 / Weight
        - `12`: せき / Cough
        - `13`: 嘔吐 / Vomit
        - `14`: 発疹 / Rash
        - `15`: けが / Injury
        - `16`: お風呂 / Baths
        - `17`: おやつ / Snack
        - `18`: 食事 / Meal
        - `19`: 水分 / Drink
        - `20`: 薬 / Medicine
        - `21`: 病院 / Hospital
        - `22`: 散歩 / Walks
        - `23`: 搾乳 / Pumping
        - `24`: カスタム1 / Custom1
        - `25`: カスタム2 / Custom2
        - `26`: カスタム3 / Custom3
        - `27`: カスタム4 / Custom4
        - `28`: カスタム5 / Custom5
        - `29`: 予防接種 / Vaccine
        - `30`: カスタム6 / Custom6
        - `31`: カスタム7 / Custom7
        - `32`: カスタム8 / Custom8
        - `33`: カスタム9 / Custom9
        - `34`: カスタム10 / Custom10
        - `35`: できた / Milestone
        - `36`: 頭囲 / Head
        - `37`: 胸囲 / Chest
        - `38`: メモ / Note
      enum:
        - 0 # OTHER
        - 1 # MOTHERS_MILK
        - 2 # MILK
        - 3 # MILKING
        - 4 # SLEEP_BEGIN
        - 5 # SLEEP_END
        - 6 # PEE
        - 7 # POO
        - 8 # BODY_TEMPERATURE
        - 9 # MEAL
        - 10 # BODY_HEIGHT
        - 11 # BODY_WEIGHT
        - 12 # COUGH
        - 13 # VOMITING
        - 14 # RASH
        - 15 # INJURY
        - 16 # BATH
        - 17 # SNACK
        - 18 # MEAL2
        - 19 # DRINK
        - 20 # MEDICINE
        - 21 # HOSPITAL
        - 22 # WALKING
        - 23 # PUMPING
        - 24 # CUSTOM1
        - 25 # CUSTOM2
        - 26 # CUSTOM3
        - 27 # CUSTOM4
        - 28 # CUSTOM5
        - 29 # VACCINE
        - 30 # CUSTOM6
        - 31 # CUSTOM7
        - 32 # CUSTOM8
        - 33 # CUSTOM9
        - 34 # CUSTOM10
        - 35 # MILESTONE
        - 36 # HEAD
        - 37 # CHEST
        - 38 # MEMO

    RoleType:
      type: integer
      description: |
        ユーザーロール定数

        - `0`: 管理者 / ADMIN
        - `1`: ユーザー / USER
        - `2`: サポーター / SUPPORTER
      enum:
