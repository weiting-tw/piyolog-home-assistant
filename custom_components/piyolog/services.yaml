            - label: "Green (緑)"
              value: "green"
            - label: "Red (赤)"
              value: "red"
            - label: "Black (黒)"
              value: "black"
    baby_id:
      name: Baby ID
      description: Baby ID (optional, uses default if not specified)
      example: "abc123def456"
      selector:
        text:
    baby_index:
      name: Baby Index
      description: Index of baby (0-based, optional)
