add_pee:
  name: Add Pee Event
  description: Register a pee event to PiyoLog
  fields:
    baby_id:
      name: Baby ID
      description: Baby ID (optional, uses default if not specified)
      example: "abc123def456"
      selector:
        text:
    baby_index:
      name: Baby Index
      description: Index of baby (0-based, optional)
      example: 0
      selector:
        number:
          min: 0
          max: 10
    datetime:
      name: Date/Time
      description: Event datetime (optional, defaults to now)
      example: "2026-02-09T14:30:00"
      selector:
        text:
    memo:
      name: Memo
      description: Optional note
      example: "Lots of pee"
      selector:
        text:

add_poo:
  name: Add Poo Event
  description: Register a poo event to PiyoLog
  fields:
    poo_amount:
      name: Amount
      description: Poo amount/volume (optional)
      example: "normal"
      selector:
        select:
          options:
            - label: "Not recorded"
              value: "default"
            - label: "Bit (ちょこっと)"
              value: "bit"
            - label: "Small (少なめ)"
              value: "small"
            - label: "Medium (ふつう)"
              value: "normal"
            - label: "Large (多め)"
              value: "large"
    poo_hardness:
      name: Hardness
      description: Poo consistency/hardness (optional)
      example: "normal"
      selector:
        select:
          options:
            - label: "Not recorded"
              value: "default"
            - label: "Diarrhea (下痢)"
              value: "diarrhea"
            - label: "Soft (やわらかめ)"
              value: "soft"
            - label: "Normal (ふつう)"
              value: "normal"
            - label: "Hard (かため)"
              value: "hard"
    poo_color:
      name: Color
